																				<h5 th:text="${k.jumlah}">1
																				</h5>

																			<td>

																			<td>
																				<h5
																					th:text="'Rp. ' + ${k.subtotalFormat}">

																			<td>

																			</td>

																	</tbody>

																	<tfoot>

																					<h4 class="theme-color fw-bold">
																						Total
																						Price :</h4>
																				</td>
																				<td>
																					<h4 class="theme-color fw-bold"

																						0.00</h4>
																					<!-- Total harga sebagai hidden input -->
																					<input type="hidden"
																						name="totalHarga"
																						th:value="${totalHarga}">

																				</td>
																			</tr>

																			<tr class="table-order">
																				<td colspan="4">
																					<h5>Penyewa :</h5>
																				</td>
																				<td>
																					<select class="form-select"
																						aria-label="Default select example"
																						name="penyewaId" required>
																						<option value="" disabled
																							selected>
																							Pilih Penyewa
																						</option>
																						<option
																							th:each="p : ${listPelanggan}"
																							th:value="${p.pelangganId}"
																							th:text="${p.nama}">
																						</option>
																					</select>
																				</td>
																			</tr>

																			<tr class="table-order">
																				<td colspan="4">
																					<h5>Lama sewa :</h5>
																				</td>
																				<td>
																					<select class="form-select"
																						name="lamaSewa"
																						aria-label="Default select example"
																						required>
																						<option value="" disabled
																							selected>Lama sewa
																						</option>
																						<option value="1">2H1M</option>
																						<option value="2">3H2M</option>
																						<option value="3">4H3M</option>
																						<option value="4">5H4M</option>
																						<option value="5">6H5M</option>
																					</select>
																				</td>
																			</tr>

																			<tr>
																				<td colspan="5"
																					class="text-center pt-3">
																					<button type="submit"
																						class="btn btn-success">Checkout</button>
																				</td>
																			</tr>
																		</form>
																	</tfoot>
