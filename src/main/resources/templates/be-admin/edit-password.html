<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<div th:replace="~{'be-admin/head' :: head}"></div>

<body>
	<!-- tap on top start -->
	<div class="tap-top">
		<span class="lnr lnr-chevron-up"></span>
	</div>
	<!-- tap on tap end -->

	<!-- page-wrapper start -->
	<div class="page-wrapper compact-wrapper dark-sidebar" id="pageWrapper">
		<!-- Page Header start -->
		<div th:replace="~{'be-admin/header' :: header}"></div>
		<!-- Page Header end -->

		<!-- Page Body start -->
		<div class="page-body-wrapper">
			<!-- Page Sidebar Start-->
			<div th:replace="~{'be-admin/sidebar' :: sidebar}"></div>
			<!-- Page Sidebar Ends-->

			<div class="page-body">
				<div id="alert-success" th:if="${success}" class="alert alert-success" th:text="${success}"></div>
				<div id="alert-error" th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

				<div class="title-header">
					<h5>Edit Password</h5>
				</div>

				<!-- New Product Add Start -->
				<form th:action="@{/admin/update-password}" method="post">
					<div class="container-fluid">
						<div class="row">
							<div class="col-12">
								<div class="row">
									<div class="col-sm-12">
										<div class="card">
											<div class="card-body">

												<div class="theme-form theme-form-2 mega-form">
													<div class="row">
														<div class="mb-4 row align-items-center">
															<label class="form-label-title col-sm-2 mb-0">Password
																Lama</label>
															<div class="col-sm-10">
																<input class="form-control" type="password"
																	name="oldPassword" required>
															</div>
														</div>
														<div class="mb-4 row align-items-center">
															<label class="form-label-title col-sm-2 mb-0">Password
																Baru</label>
															<div class="col-sm-10">
																<input class="form-control" type="password"
																	name="newPassword" required>
															</div>
														</div>
														<div class="mb-4 row align-items-center">
															<label class="form-label-title col-sm-2 mb-0">Konfirmasi
																Password Baru</label>
															<div class="col-sm-10">
																<input class="form-control" type="password"
																	name="confirmPassword" required>
															</div>
														</div>

													</div>
												</div>
											</div>
										</div>

										<div class="card">
											<div class="card-body">

												<div class="theme-form theme-form-2 mega-form">
													<div class="row">
														<div class="col-12">
															<div class="row">
																<button type="submit"
																	class="btn btn-success float-right">
																	<i class="fas fa-plus-square">Edit</i>
																</button>
																<hr>
																<a th:href="@{/admin/dashboard}"
																	class="btn btn-primary float-left"><i
																		class="fas fa-angle-left">Back</i></a>
															</div>
														</div>
													</div>
												</div>
											</div>
										</div>

									</div>
								</div>
							</div>
						</div>
					</div>
				</form>
				<!-- New Product Add End -->

				<!-- footer Start -->
				<div th:replace="~{'be-admin/footer' :: footer}"></div>
				<!-- footer En -->
			</div>
			<!-- Container-fluid End -->
		</div>
		<!-- Page Body End -->
	</div>
	<!-- page-wrapper End -->

	<!-- Modal Start -->
	<div th:replace="~{'be-admin/modal' :: modal}"></div>
	<!-- Modal End -->

				</div>
			</div>
		</div>
	</div> -->

	<script>
		// Hilangkan alert-success setelah 3 detik
		const alertSuccess = document.getElementById('alert-success');
		if (alertSuccess) {
			setTimeout(() => {
				alertSuccess.style.transition = "opacity 0.5s";
				alertSuccess.style.opacity = 0;
				setTimeout(() => alertSuccess.remove(), 500); // remove node after fade-out
			}, 3000); // 3 detik
		}

		// Hilangkan alert-error setelah 3 detik
		const alertError = document.getElementById('alert-error');
		if (alertError) {
			setTimeout(() => {
				alertError.style.transition = "opacity 0.5s";
				alertError.style.opacity = 0;
				setTimeout(() => alertError.remove(), 500);
			}, 3000); // 3 detik
		}
	</script>


</body>

</html>
