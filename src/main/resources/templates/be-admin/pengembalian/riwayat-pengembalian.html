<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<div th:replace="~{'be-admin/head' :: head}"></div>

<body>
	<!-- tap on top start-->
	<div class="tap-top">
		<span class="lnr lnr-chevron-up"></span>
	</div>
	<!-- tap on tap end-->

	<!-- page-wrapper Start-->
	<div class="page-wrapper compact-wrapper dark-sidebar" id="pageWrapper">
		<!-- Page Header Start-->
		<div th:replace="~{'be-admin/header' :: header}"></div>
		<!-- Page Header Ends-->

		<!-- Page Body Start-->
		<div class="page-body-wrapper">
			<!-- Page Sidebar Start-->
			<div th:replace="~{'be-admin/sidebar' :: sidebar}"></div>
			<!-- Page Sidebar Ends-->

			<!-- Container-fluid starts-->
			<div th:if="${success}">
				<div class="alert alert-success" th:text="${success}"></div>
			</div>

			<div class="page-body">
				<div class="title-header">
					<h5>Riwayat Pengembalian</h5>
				</div>

				<div class="container-fluid">
					<div class="row">
						<div class="col-sm-12">
							<div class="card">
								<div class="card-body">
									<div>
										<div class="table-responsive table-desi table-product">
											<table class="table table-1d all-package">
												<thead>
													<tr>
														<th>No</th>
														<th>Id Sewa</th>
														<th>Pelanggan</th>
														<th>Tanggal Pinjam</th>
														<th>Tanggal Pengembalian</th>
														<th>Status</th>
														<th>Total Harga</th>
														<th>Denda</th>
														<!--<th>Keterangan</th>
														<th>Option</th>-->
													</tr>
												</thead>

												<tbody>
													<tr th:each="p, stat :${pengembalianList}">
														<td th:text="${stat.count}"></td>
														<td th:text="${p.penyewaan.penyewaanId}"></td>
														<td th:text="${p.penyewaan.pelanggan.nama}"></td>
														<td
															th:text="${#temporals.format(p.penyewaan.tanggalPinjam, 'dd-MM-yyyy')}">
														</td>
														<td
															th:text="${#temporals.format(p.tanggalPengembalian, 'dd-MM-yyyy')}">
														</td>
														<td th:text="${p.statusPengembalian}"></td>
														<td
															th:text="${'Rp.' + #numbers.formatDecimal(p.penyewaan.totalHarga, 0, 'POINT', 0, 'COMMA')}">
														</td>
														<td
															th:text="${'Rp.' + #numbers.formatDecimal(p.denda, 0, 'POINT', 0, 'COMMA')}">
														</td>
														<!--<td th:text="${p.keterangan}"></td>
														<td>
															<ul>
																<li>
																	<a th:href="@{/pengembalian/form/{id}(id=${p.id})}">
																		<span class="lnr lnr-pencil"></span>
																	</a>
																</li>
															</ul>
														</td>-->
													</tr>
												</tbody>
											</table>
										</div>
									</div>
								</div>

								<div class="pagination-box" th:if="${totalPages > 0}">
									<nav aria-label="...">
										<ul class="pagination pagination-primary">
											<li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
												<a class="page-link"
													th:href="@{/pengembalian/riwayat(page=${currentPage - 1})}"
													tabindex="-1">Previous</a>
											</li>

											<th:block th:if="${currentPage > 2}">
												<li class="page-item">
													<a class="page-link"
														th:href="@{'/pengembalian/riwayat?page=0'}">1</a>
												</li>
												<li class="page-item disabled">
													<span class="page-link">...</span>
												</li>
											</th:block>

											<th:block
												th:each="pageNumber : ${#numbers.sequence(currentPage - 1, currentPage + 1)}"
												th:if="${pageNumber >= 0 and pageNumber < totalPages}">
												<li class="page-item"
													th:classappend="${currentPage == pageNumber} ? 'active'">
													<a class="page-link"
														th:href="@{'/pengembalian/riwayat?page=' + ${pageNumber}}">[[${pageNumber
														+
														1}]]</a>
												</li>
											</th:block>

											<th:block th:if="${currentPage < totalPages - 3}">
												<li class="page-item disabled">
													<span class="page-link">...</span>
												</li>
												<li class="page-item">
													<a class="page-link"
														th:href="@{/pengembalian/riwayat(page= ${totalPages - 1})}">[[${totalPages}]]</a>
												</li>
											</th:block>

											<li class="page-item"
												th:classappend="${currentPage == (totalPages - 1)} ? 'disabled'">
												<a class="page-link"
													th:href="@{/pengembalian/riwayat(page=${currentPage + 1})}">Next</a>
											</li>
										</ul>
									</nav>
								</div>

								<!--<div class="pagination-box">
									<nav class="ms-auto me-auto " aria-label="...">
										<ul class="pagination pagination-primary">
											<li class="page-item disabled">
												<a class="page-link" href="javascript:void(0)"
													tabindex="-1">Previous</a>
											</li>

											<li class="page-item active">
												<a class="page-link" href="javascript:void(0)">1</a>
											</li>
											<li class="page-item">
												<a class="page-link" href="javascript:void(0)">2 <span
														class="sr-only">(current)</span>
												</a>
											</li>

											<li class="page-item">
												<a class="page-link" href="javascript:void(0)">3</a>
											</li>

											<li class="page-item">
												<a class="page-link" href="javascript:void(0)">Next</a>
											</li>
										</ul>
									</nav>
								</div>-->

							</div>
						</div>
					</div>
				</div>
				<!-- Container-fluid Ends-->

				<div th:replace="~{'be-admin/footer' :: footer}"></div>
			</div>
		</div>
	</div>
	<!-- page-wrapper End-->

	<!-- Modal Start -->
	<div th:replace="~{'be-admin/modal' :: modal}"></div>
	<!-- Modal End -->

	<div th:replace="~{'be-admin/script' :: script}"></div>
</body>

</html>
